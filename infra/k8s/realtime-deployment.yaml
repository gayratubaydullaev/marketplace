apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-service
  namespace: marketplace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realtime-service
  template:
    metadata:
      labels:
        app: realtime-service
    spec:
      containers:
        - name: realtime
          image: gayrat/realtime-service:latest
          ports:
            - containerPort: 8012
          env:
            - name: HTTP_PORT
              value: "8012"
          envFrom:
            - configMapRef:
                name: marketplace-config
            - secretRef:
                name: marketplace-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8012
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-service
  namespace: marketplace
spec:
  selector:
    app: realtime-service
  ports:
    - port: 8012
      targetPort: 8012

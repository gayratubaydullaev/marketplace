apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gayrat-marketplace
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/EXAMPLE/gayrat.git
    targetRevision: HEAD
    path: infra/k8s/charts/marketplace
  destination:
    server: https://kubernetes.default.svc
    namespace: marketplace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: v1
kind: Secret
metadata:
  name: marketplace-secrets
  namespace: marketplace
type: Opaque
stringData:
  DATABASE_URL: "postgres://marketplace_app:CHANGE_ME@postgres:5432/marketplace?sslmode=require&options=-csearch_path%3Dmarketplace"
  REDIS_URL: "redis://:CHANGE_ME@redis:6379/0"
  JWT_SECRET: "CHANGE_ME"
  JWT_PRIVATE_KEY_PEM: ""
  JWT_PUBLIC_KEY_PEM: ""
  MINIO_ACCESS_KEY: "CHANGE_ME"
  MINIO_SECRET_KEY: "CHANGE_ME"
  PAYME_SECRET: "CHANGE_ME"
  CLICK_SECRET: "CHANGE_ME"
  CENTRIFUGO_SECRET: "CHANGE_ME"
---
# Apply via: kubectl apply -f infra/k8s/secrets.example.yaml
# Prefer ExternalSecrets / Vault Agent Injector in production.

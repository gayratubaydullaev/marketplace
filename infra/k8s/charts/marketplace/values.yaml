namespace: marketplace
imageRegistry: gayrat
imageTag: latest
imagePullPolicy: IfNotPresent

defaults:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70

secrets:
  name: marketplace-secrets

ingress:
  enabled: true
  className: nginx
  host: api.gayrat.uz
  gatewayPort: 8000
  annotations: {}
  tls:
    - hosts: [api.gayrat.uz]
      secretName: marketplace-api-tls

externalSecrets:
  enabled: false
  storeName: vault-backend
  storeKind: ClusterSecretStore
  vaultPath: secret/gayrat/marketplace

services:
  auth:
    port: 8001
    replicas: 3
    hpa:
      minReplicas: 3
      maxReplicas: 20
  catalog:
    port: 8002
  search:
    port: 8003
  cart:
    port: 8004
  orders:
    port: 8005
  payments:
    port: 8006
  vendor:
    port: 8007
  reviews:
    port: 8008
  notifications:
    port: 8009
  analytics:
    port: 8010
  media:
    port: 8011
  realtime:
    port: 8012

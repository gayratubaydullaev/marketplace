{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: marketplace-secrets
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName | default "vault-backend" }}
    kind: {{ .Values.externalSecrets.storeKind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.secrets.name }}
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/database_url
    - secretKey: JWT_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/jwt_secret
    - secretKey: STRIPE_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/stripe_secret
    - secretKey: PAYME_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/payme_key
{{- end }}

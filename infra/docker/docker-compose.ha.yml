# HA topology reference (local multi-node). Not a substitute for managed cloud HA.
# Usage: docker compose -f infra/docker/docker-compose.ha.yml up -d

services:
  postgres-primary:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
    volumes:
      - pg-primary:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-replica:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
      POSTGRES_DB: marketplace
    ports:
      - "5433:5432"
    volumes:
      - pg-replica:/var/lib/postgresql/data
    profiles: ["replica"]
    # Wire streaming replication in ops; profile keeps default bring-up light.

  citus-coordinator:
    image: citusdata/citus:12.1
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
      POSTGRES_DB: marketplace
    ports:
      - "5434:5432"
    volumes:
      - citus-coord:/var/lib/postgresql/data
    profiles: ["citus"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace"]
      interval: 5s
      timeout: 3s
      retries: 10

  citus-worker-1:
    image: citusdata/citus:12.1
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
      POSTGRES_DB: marketplace
    volumes:
      - citus-w1:/var/lib/postgresql/data
    profiles: ["citus"]

  citus-worker-2:
    image: citusdata/citus:12.1
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
      POSTGRES_DB: marketplace
    volumes:
      - citus-w2:/var/lib/postgresql/data
    profiles: ["citus"]

  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      node.name: es01
      cluster.name: gayrat-ha
      discovery.seed_hosts: es01,es02,es03
      cluster.initial_master_nodes: es01,es02,es03
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es01:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12

  es02:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      node.name: es02
      cluster.name: gayrat-ha
      discovery.seed_hosts: es01,es02,es03
      cluster.initial_master_nodes: es01,es02,es03
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - es02:/usr/share/elasticsearch/data

  es03:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      node.name: es03
      cluster.name: gayrat-ha
      discovery.seed_hosts: es01,es02,es03
      cluster.initial_master_nodes: es01,es02,es03
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - es03:/usr/share/elasticsearch/data

  redis-master:
    image: redis:7-alpine
    command: redis-server --appendonly yes --port 6379
    ports:
      - "6379:6379"
    volumes:
      - redis-master:/data

  redis-replica:
    image: redis:7-alpine
    command: redis-server --appendonly yes --replicaof redis-master 6379
    depends_on:
      - redis-master
    volumes:
      - redis-replica:/data

  redis-sentinel:
    image: redis:7-alpine
    command: >
      sh -c 'echo "sentinel monitor mymaster redis-master 6379 1" > /tmp/sentinel.conf
      && echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf
      && redis-sentinel /tmp/sentinel.conf'
    depends_on:
      - redis-master
      - redis-replica
    ports:
      - "26379:26379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka-1:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-2:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

volumes:
  pg-primary:
  pg-replica:
  citus-coord:
  citus-w1:
  citus-w2:
  es01:
  es02:
  es03:
  redis-master:
  redis-replica:

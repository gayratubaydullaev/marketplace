name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - name: Download modules
        run: |
          (cd packages/go-common && go mod tidy)
          for s in auth catalog search cart orders payments vendor reviews notifications analytics media realtime; do
            (cd services/$s && go mod tidy)
          done
      - name: Build services
        run: |
          for s in auth catalog search cart orders payments vendor reviews notifications analytics media realtime; do
            (cd services/$s && go build -o /tmp/$s ./cmd/server)
          done
      - name: Test
        run: |
          (cd packages/go-common && go test ./...)
          for s in auth catalog search cart orders payments vendor reviews notifications analytics media realtime; do
            (cd services/$s && go test ./...)
          done

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm build
